name: Deploy Staging

on:
  push:
    branches: [develop]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy
        env:
          SSH_KEY: ${{ secrets.CICD_KEY }}
        run: |
          install -m 600 -D /dev/null ~/.ssh/id_rsa
          echo "$SSH_KEY" > ~/.ssh/id_rsa
          ssh -o StrictHostKeyChecking=no -o IdentitiesOnly=yes -i ~/.ssh/id_rsa \
            root@62.169.22.255 \
            "set -e && cd /var/www/staging && git pull origin develop && /usr/bin/php8.4 /usr/local/bin/composer install --no-interaction --prefer-dist --optimize-autoloader && /usr/bin/php8.4 artisan migrate --force && /usr/bin/php8.4 artisan optimize:clear && /usr/bin/php8.4 artisan config:cache && /usr/bin/php8.4 artisan route:cache && /usr/bin/php8.4 artisan view:cache && /usr/bin/php8.4 artisan filament:cache-components && chown -R www-data:www-data storage bootstrap/cache public/storage && php artisan queue:restart"
