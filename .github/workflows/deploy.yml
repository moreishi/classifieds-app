name: Deploy to Production

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Debug and Deploy
        env:
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
        run: |
          set -x
          which ssh
          ssh -V
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ls -la ~/.ssh/
          head -1 ~/.ssh/id_ed25519
          wc -c ~/.ssh/id_ed25519
          ssh -o StrictHostKeyChecking=no -o IdentitiesOnly=yes -i ~/.ssh/id_ed25519 \
            root@62.169.22.255 "echo SSH_CONNECTED" && echo "SSH_SUCCESS" || echo "SSH_FAILED"
          ssh -o StrictHostKeyChecking=no -o IdentitiesOnly=yes -i ~/.ssh/id_ed25519 \
            root@62.169.22.255 "echo SSH_OK && cd /var/www/app && git pull origin master" && echo "GIT_PULL_OK" || echo "GIT_PULL_FAILED"
