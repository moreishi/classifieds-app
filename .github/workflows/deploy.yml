name: Deploy to Production

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Add SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -t rsa 62.169.22.255 >> ~/.ssh/known_hosts

      - name: Deploy
        run: |
          ssh root@62.169.22.255 '
            set -e
            cd /var/www/app
            git pull origin master
            /usr/bin/php8.4 /usr/bin/composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader
            /usr/bin/php8.4 artisan migrate --force
            /usr/bin/php8.4 artisan optimize:clear
            /usr/bin/php8.4 artisan config:cache
            /usr/bin/php8.4 artisan route:cache
            /usr/bin/php8.4 artisan view:cache
            /usr/bin/php8.4 artisan filament:cache-components
            chown -R www-data:www-data storage bootstrap/cache public/storage
            php artisan queue:restart
            echo "Deploy complete!"
          '
