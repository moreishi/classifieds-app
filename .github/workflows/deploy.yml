name: Deploy to Production

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 62.169.22.255
          username: root
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            cd /var/www/app

            # 1. Pull latest code
            git pull origin master

            # 2. Install dependencies (production only)
            /usr/bin/php8.4 /usr/bin/composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader

            # 3. Run migrations
            /usr/bin/php8.4 artisan migrate --force

            # 4. Optimize Laravel
            /usr/bin/php8.4 artisan optimize:clear
            /usr/bin/php8.4 artisan config:cache
            /usr/bin/php8.4 artisan route:cache
            /usr/bin/php8.4 artisan view:cache
            /usr/bin/php8.4 artisan filament:cache-components

            # 5. Set permissions
            chown -R www-data:www-data storage bootstrap/cache public/storage

            # 6. Restart queue
            php artisan queue:restart

            echo "Deploy complete!"
