services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: iskinaph:latest
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=iskina
      - DB_USERNAME=iskina
      - DB_PASSWORD=${DB_PASSWORD:-secret}
      - SESSION_DRIVER=database
      - QUEUE_CONNECTION=database
      - FILESYSTEM_DISK=public
      - MAIL_MAILER=log
    volumes:
      - storage_data:/app/storage
    ports:
      - "9000:9000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/ping"]
      interval: 60s
      timeout: 3s
      retries: 3
      start_period: 10s

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - storage_data:/app/storage:ro
      - ./public:/app/public:ro

  queue:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: iskinaph:latest
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=iskina
      - DB_USERNAME=iskina
      - DB_PASSWORD=${DB_PASSWORD:-secret}
      - SESSION_DRIVER=database
      - QUEUE_CONNECTION=database
    volumes:
      - storage_data:/app/storage
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: iskinaph:latest
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=iskina
      - DB_USERNAME=iskina
      - DB_PASSWORD=${DB_PASSWORD:-secret}
      - SESSION_DRIVER=database
      - QUEUE_CONNECTION=database
    volumes:
      - storage_data:/app/storage
    command: php artisan schedule:work

  mysql:
    image: mariadb:11
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-rootsecret}
      - MYSQL_DATABASE=iskina
      - MYSQL_USER=iskina
      - MYSQL_PASSWORD=${DB_PASSWORD:-secret}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  mysql_data:
  storage_data:
