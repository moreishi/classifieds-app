services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: build
      args:
        - PHP_VERSION=8.4
    image: iskinaph:dev
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=iskina
      - DB_USERNAME=iskina
      - DB_PASSWORD=${DB_PASSWORD:-secret}
      - SESSION_DRIVER=database
      - QUEUE_CONNECTION=database
      - APP_ENV=local
      - APP_DEBUG=true
    volumes:
      - .:/app
      - storage_data:/app/storage
    command: php artisan serve --host=0.0.0.0 --port=8080
    ports:
      - "8200:8080"

  queue:
    image: iskinaph:dev
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=iskina
      - DB_USERNAME=iskina
      - DB_PASSWORD=${DB_PASSWORD:-secret}
      - QUEUE_CONNECTION=database
      - APP_ENV=local
      - APP_DEBUG=true
    volumes:
      - .:/app
      - storage_data:/app/storage
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600

  scheduler:
    image: iskinaph:dev
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=iskina
      - DB_USERNAME=iskina
      - DB_PASSWORD=${DB_PASSWORD:-secret}
      - QUEUE_CONNECTION=database
      - APP_ENV=local
      - APP_DEBUG=true
    volumes:
      - .:/app
      - storage_data:/app/storage
    command: php artisan schedule:work

  mysql:
    image: mariadb:11
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-rootsecret}
      - MYSQL_DATABASE=iskina
      - MYSQL_USER=iskina
      - MYSQL_PASSWORD=${DB_PASSWORD:-secret}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  mysql_data:
  storage_data:
