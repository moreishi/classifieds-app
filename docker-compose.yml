services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: classifieds-app
    restart: unless-stopped
    ports:
      - "8200:80"
    environment:
      APP_ENV: local
      APP_DEBUG: true
      APP_KEY: base64:3FvZ2R0PfWfMlQhX+RPGxJTw7ZnG1OVx7JPF+7/G1ZM=
      APP_URL: http://localhost:8200
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: classifieds
      DB_USERNAME: classifieds
      DB_PASSWORD: classifieds
      LOG_LEVEL: debug
      FILESYSTEM_DISK: local
      QUEUE_CONNECTION: database
      CACHE_STORE: database
      MAIL_MAILER: log
    volumes:
      - .:/app
      - /app/node_modules
      - /app/vendor
      - classifieds_storage:/app/storage
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - classifieds

  mysql:
    image: mysql:8.4
    container_name: classifieds-mysql
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: classifieds
      MYSQL_USER: classifieds
      MYSQL_PASSWORD: classifieds
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - classifieds

  queue:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: classifieds-queue
    restart: unless-stopped
    command: ["php", "/app/artisan", "queue:work", "--sleep=3", "--tries=3", "--max-time=3600"]
    environment:
      APP_ENV: local
      APP_DEBUG: true
      APP_KEY: base64:3FvZ2R0PfWfMlQhX+RPGxJTw7ZnG1OVx7JPF+7/G1ZM=
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: classifieds
      DB_USERNAME: classifieds
      DB_PASSWORD: classifieds
      QUEUE_CONNECTION: database
      QUEUE_CONVERSIONS_BY_DEFAULT: "false"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/vendor
      - classifieds_storage:/app/storage
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - classifieds

  vite:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: classifieds-vite
    restart: unless-stopped
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0"]
    ports:
      - "5173:5173"
    environment:
      APP_ENV: local
    volumes:
      - .:/app
      - /app/node_modules
      - /app/vendor
    networks:
      - classifieds

networks:
  classifieds:
    driver: bridge

volumes:
  classifieds_storage:
  mysql_data:
