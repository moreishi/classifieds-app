services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: iskina-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:80"
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_KEY: "${APP_KEY}"
      APP_URL: "${APP_URL}"
      DB_CONNECTION: mysql
      DB_HOST: "${DB_HOST}"
      DB_PORT: "${DB_PORT:-3306}"
      DB_DATABASE: "${DB_DATABASE}"
      DB_USERNAME: "${DB_USERNAME}"
      DB_PASSWORD: "${DB_PASSWORD}"
      QUEUE_CONNECTION: database
      QUEUE_CONVERSIONS_BY_DEFAULT: "false"
      CACHE_STORE: database
      SESSION_DRIVER: database
      SESSION_SECURE_COOKIE: "true"
      FILESYSTEM_DISK: local
      MAIL_MAILER: "${MAIL_MAILER:-log}"
      MAIL_HOST: "${MAIL_HOST:-}"
      MAIL_PORT: "${MAIL_PORT:-587}"
      MAIL_USERNAME: "${MAIL_USERNAME:-}"
      MAIL_PASSWORD: "${MAIL_PASSWORD:-}"
      MAIL_ENCRYPTION: "${MAIL_ENCRYPTION:-tls}"
      MAIL_FROM_ADDRESS: "${MAIL_FROM_ADDRESS:-noreply@iskina.ph}"
      MAIL_FROM_NAME: "${MAIL_FROM_NAME:-Iskina.ph}"
      LOG_LEVEL: warning
      PHP_MEMORY_LIMIT: "${PHP_MEMORY_LIMIT:-256M}"
      PHP_MAX_EXECUTION_TIME: "${PHP_MAX_EXECUTION_TIME:-300}"
      # Convert back to centavos on load (Coolify env is in pesos)
      GCASH_VERIFICATION_CHARGE: "${GCASH_VERIFICATION_CHARGE:-1}"
    volumes:
      - iskina_storage:/app/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/up"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  iskina_storage:
